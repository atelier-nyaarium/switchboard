services:
  router:
    build: .
    hostname: agent-team-bridge
    container_name: agent-team-bridge
    ports:
      - "20000:20000"
    environment:
      - PORT=20000
      - RESPONSE_TIMEOUT_MS=600000
      - BRIDGE_TOKEN=${BRIDGE_TOKEN:-}
    networks:
      - agent-team-bridge-network
    volumes:
      - .cursor:/app/log
      - ${HOME}/projects/evie-bot/kubeconfig.yaml:/app/kubeconfig.yaml:ro
networks:
  agent-team-bridge-network:
    name: agent-team-bridge
