services:
  router:
    build: .
    hostname: switchboard
    container_name: switchboard
    ports:
      - "20000:20000"
    environment:
      - PORT=20000
      - RESPONSE_TIMEOUT_MS=600000
      - BRIDGE_TOKEN=${BRIDGE_TOKEN:-}
    networks:
      - switchboard-network
    volumes:
      - .cursor:/app/log
      - ${HOME}/projects/evie-bot/kubeconfig.yaml:/app/kubeconfig.yaml:ro
networks:
  switchboard-network:
    name: switchboard
